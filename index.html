<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Kezan - 24/7 Profit</title>
    <style>
        body { background: #0a0a0a; color: #ffd100; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { width: 500px; background: #1a1a1a; border: 4px solid #3d3420; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 0 50px #ffd10022; position: relative; }
        .on-air { color: #ff0000; font-weight: bold; font-size: 1.4em; animation: blink 1s infinite; margin-bottom: 20px; text-shadow: 0 0 10px red; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .goblin-area { display: flex; justify-content: space-around; margin: 25px 0; }
        .avatar { width: 100px; height: 100px; background: #222; border: 3px solid #3d3420; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.1s; }
        .avatar.talking { border-color: #ffd100; transform: scale(1.1); box-shadow: 0 0 20px #ffd10044; }
        button { background: #ffd100; color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; font-size: 1.3em; box-shadow: 0 4px 0 #b39300; }
        #text-box { margin-top: 30px; font-style: italic; color: #eee; min-height: 120px; border-top: 1px solid #333; padding-top: 15px; font-size: 1.1em; line-height: 1.4; }
    </style>
</head>
<body>

<div class="box">
    <div class="on-air">● RADIO KEZAN - LIVE</div>
    <div class="goblin-area">
        <div id="brazz-img" class="avatar">💰</div>
        <div id="frizzo-img" class="avatar">⚙️</div>
    </div>
    <div id="text-box">Klicke für den unendlichen Profit!</div>
    <button id="startBtn" onclick="toggleRadio()">SENDER STARTEN</button>
</div>

<script>
    let isRunning = false;
    let lineIndex = 0;
    let lastChatIndex = -1;
    let currentConversation = [];
    
    // Wir nutzen deine echte WoW-Datei als Hintergrund-Loop
    const bgAudio = new Audio('g.ogg');
    bgAudio.loop = true; 

    const dialoguePool = [
        ["Brazz: Frizzo! Warum steht die Produktion?! Zeit ist Gold, Kumpel!", "Frizzo: Die Rakete ist weg, Boss! Ich hab die Trümmer als 'Mondgestein' verkauft!", "Brazz: Genial! Schreib 'Limitierte Edition' drauf und verlang den dreifachen Preis!"],
        ["Frizzo: Chef, ein Gnom will sein Gold zurück. Er sagt, das Fluggerät hätte keine Flügel!", "Brazz: Keine Flügel?! Das ist ein 'Aerodynamisches Boden-Fahrzeug'! Schmeiß ihn raus!", "Frizzo: Wird gemacht, Boss! Ich hol schon mal die Zündschnur!"],
        ["Brazz: Frizzo! Was ist das für ein Gestank?!", "Frizzo: Das ist das neue Kaja'Cola-Konzentrat! Ein Schluck und du siehst die Zukunft!", "Brazz: Die Zukunft?! Perfekt! Wir nennen es 'Goblin-Orakel-Saft'!"],
        ["Brazz: Hast du die Allianz-Wachen bestochen?", "Frizzo: Mit bleigefüllten Goldmünzen, wie besprochen!", "Brazz: Das ist mein Junge. Ehrlich währt am längsten... oder so ähnlich."]
    ];

    function toggleRadio() {
        if (!isRunning) {
            isRunning = true;
            bgAudio.play();
            document.getElementById('startBtn').innerText = "SENDER STOPPEN";
            document.getElementById('startBtn').style.background = "#ff4444";
            nextConversation();
        } else {
            isRunning = false;
            bgAudio.pause();
            document.getElementById('startBtn').innerText = "SENDER STARTEN";
            document.getElementById('startBtn').style.background = "#ffd100";
        }
    }

    function nextConversation() {
        if (!isRunning) return;
        let nextIndex;
        do { nextIndex = Math.floor(Math.random() * dialoguePool.length); } while (nextIndex === lastChatIndex);
        lastChatIndex = nextIndex;
        currentConversation = dialoguePool[nextIndex];
        lineIndex = 0;
        showLine();
    }

    function showLine() {
        if (!isRunning) return;
        const fullLine = currentConversation[lineIndex];
        const parts = fullLine.split(": ");
        const speaker = parts[0];
        const text = parts[1];

        // Wir schalten die Avatare passend zum Text um
        if (speaker === "Brazz") {
            document.getElementById('brazz-img').classList.add('talking');
            document.getElementById('frizzo-img').classList.remove('talking');
        } else {
            document.getElementById('frizzo-img').classList.add('talking');
            document.getElementById('brazz-img').classList.remove('talking');
        }

        document.getElementById('text-box').innerText = speaker + ": " + text;

        // Nach 4 Sekunden zur nächsten Zeile (ohne Roboterstimme!)
        setTimeout(() => {
            lineIndex++;
            if (lineIndex < currentConversation.length) {
                showLine();
            } else {
                document.getElementById('brazz-img').classList.remove('talking');
                document.getElementById('frizzo-img').classList.remove('talking');
                setTimeout(nextConversation, 2000);
            }
        }, 4000);
    }
</script>
</body>
</html>
